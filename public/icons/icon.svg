<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">

  <!-- Fond vert arrondi -->
  <rect width="512" height="512" rx="110" fill="#1E6B2E"/>

  <!-- ═══ AILES (derrière le corps) ═══ -->
  <ellipse cx="168" cy="188" rx="95" ry="32"
    fill="rgba(255,255,255,0.52)" transform="rotate(-38,168,188)"/>
  <ellipse cx="180" cy="232" rx="70" ry="24"
    fill="rgba(255,255,255,0.36)" transform="rotate(-18,180,232)"/>
  <ellipse cx="344" cy="188" rx="95" ry="32"
    fill="rgba(255,255,255,0.52)" transform="rotate(38,344,188)"/>
  <ellipse cx="332" cy="232" rx="70" ry="24"
    fill="rgba(255,255,255,0.36)" transform="rotate(18,332,232)"/>

  <!-- ═══ PATTES — traits épais lisibles en petit ═══ -->
  <!-- Gauche avant -->
  <path d="M 220,192 Q 150,165 102,128" stroke="white" stroke-width="11"
    fill="none" stroke-linecap="round"/>
  <!-- Gauche milieu -->
  <path d="M 210,212 Q 140,218  82,228" stroke="white" stroke-width="11"
    fill="none" stroke-linecap="round"/>
  <!-- Gauche arrière -->
  <path d="M 216,238 Q 148,268 102,312" stroke="white" stroke-width="11"
    fill="none" stroke-linecap="round"/>
  <!-- Droite avant -->
  <path d="M 292,192 Q 362,165 410,128" stroke="white" stroke-width="11"
    fill="none" stroke-linecap="round"/>
  <!-- Droite milieu -->
  <path d="M 302,212 Q 372,218 430,228" stroke="white" stroke-width="11"
    fill="none" stroke-linecap="round"/>
  <!-- Droite arrière -->
  <path d="M 296,238 Q 364,268 410,312" stroke="white" stroke-width="11"
    fill="none" stroke-linecap="round"/>

  <!-- ═══ ABDOMEN effilé ═══ -->
  <path d="M 222,230 Q 196,308 208,378
           Q 232,416 256,416
           Q 280,416 304,378
           Q 316,308 290,230 Z" fill="white"/>

  <!-- ═══ THORAX ═══ -->
  <ellipse cx="256" cy="210" rx="54" ry="48" fill="white"/>

  <!-- ═══ TÊTE ═══ -->
  <ellipse cx="256" cy="144" rx="34" ry="30" fill="white"/>
  <!-- Yeux -->
  <circle cx="240" cy="138" r="10" fill="#1E6B2E"/>
  <circle cx="272" cy="138" r="10" fill="#1E6B2E"/>
  <!-- Reflets -->
  <circle cx="243" cy="135" r="4" fill="white" opacity="0.55"/>
  <circle cx="275" cy="135" r="4" fill="white" opacity="0.55"/>

  <!-- ═══ ANTENNES ═══ -->
  <path d="M 240,116 Q 212,84 194,52"
    stroke="white" stroke-width="7" fill="none" stroke-linecap="round"/>
  <path d="M 272,116 Q 300,84 318,52"
    stroke="white" stroke-width="7" fill="none" stroke-linecap="round"/>

  <!-- ═══ PROBOSCIS (dard long et fin) ═══ -->
  <line x1="256" y1="114" x2="256" y2="38"
    stroke="white" stroke-width="9" stroke-linecap="round"/>
  <circle cx="256" cy="37" r="6" fill="white"/>

</svg>
